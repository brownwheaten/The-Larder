<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>The Larder - Recipe Tool</title>
      <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background: #fdf6ec; color: #333; }
                header { background: #4a2c2a; color: #fff; padding: 2rem; text-align: center; }
                header h1 { font-size: 2.5rem; letter-spacing: 2px; }
        header p { margin-top: 0.5rem; font-style: italic; color: #d4a96a; }
                .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .search-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .search-bar input { flex: 1; padding: 0.75rem 1rem; font-size: 1rem; border: 2px solid #c8a97e; border-radius: 4px; background: #fff; }
        .search-bar button { padding: 0.75rem 1.5rem; background: #4a2c2a; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
                .search-bar button:hover { background: #6b3f3c; }
        .add-recipe { background: #fff; border: 2px solid #c8a97e; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
                  .add-recipe h2 { color: #4a2c2a; margin-bottom: 1rem; }
        .form-row { display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
        .form-row input, .form-row textarea, .form-row select { flex: 1; min-width: 150px; padding: 0.5rem; border: 1px solid #c8a97e; border-radius: 4px; font-family: inherit; font-size: 0.95rem; }
        .form-row textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        .btn-primary { background: #4a2c2a; color: #fff; }
                .btn-primary:hover { background: #6b3f3c; }
        .btn-danger { background: #c0392b; color: #fff; }
                  .btn-danger:hover { background: #e74c3c; }
                  .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .recipe-card { background: #fff; border: 1px solid #e0c9a6; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
                  .recipe-card h3 { color: #4a2c2a; margin-bottom: 0.4rem; }
        .recipe-card .category { font-size: 0.8rem; background: #f5e6cc; color: #8b5a2b; padding: 2px 8px; border-radius: 12px; display: inline-block; margin-bottom: 0.5rem; }
                .recipe-card p { font-size: 0.9rem; color: #555; line-height: 1.5; }
        .recipe-card .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .empty-state { text-align: center; padding: 3rem; color: #999; font-style: italic; }
    </style>
      </head>
      <body>
          <header>
              <h1>The Larder</h1>
              <p>Your personal recipe collection</p>
          </header>
          <div class="container">
              <div class="search-bar">
                  <input type="text" id="searchInput" placeholder="Search recipes by name or ingredient..." oninput="renderRecipes()">
                  <button onclick="renderRecipes()">Search</button>
              </div>
              <div class="add-recipe">
                  <h2>Add a New Recipe</h2>
                  <div class="form-row">
                      <input type="text" id="recipeName" placeholder="Recipe name *">
                      <select id="recipeCategory">
                          <option value="">Select category</option>
                          <option>Breakfast</option>
                          <option>Lunch</option>
                          <option>Dinner</option>
                          <option>Dessert</option>
                          <option>Snack</option>
                          <option>Baking</option>
                          <option>Soup</option>
                          <option>Salad</option>
                          <option>Drink</option>
                      </select>
                  </div>
                  <div class="form-row">
                      <textarea id="recipeIngredients" placeholder="Ingredients (one per line)"></textarea>
                      <textarea id="recipeInstructions" placeholder="Instructions / method"></textarea>
                  </div>
                  <button class="btn btn-primary" onclick="addRecipe()">Add Recipe</button>
              </div>
              <div class="recipes-grid" id="recipesGrid"></div>
          </div>
          <script>
              let recipes = JSON.parse(localStorage.getItem('larder_recipes') || '[]');

        function save() {
                      localStorage.setItem('larder_recipes', JSON.stringify(recipes));
        }

        function addRecipe() {
                      const name = document.getElementById('recipeName').value.trim();
            if (!name) { alert('Please enter a recipe name.'); return; }
            recipes.push({
                              id: Date.now(),
                              name,
                              category: document.getElementById('recipeCategory').value,
                              ingredients: document.getElementById('recipeIngredients').value.trim(),
                              instructions: document.getElementById('recipeInstructions').value.trim()
              });
            save();
            document.getElementById('recipeName').value = '';
                          document.getElementById('recipeCategory').value = '';
                                        document.getElementById('recipeIngredients').value = '';
                                                      document.getElementById('recipeInstructions').value = '';
                                                                    renderRecipes();
        }

        function deleteRecipe(id) {
                      if (!confirm('Delete this recipe?')) return;
            recipes = recipes.filter(r => r.id !== id);
            save();
            renderRecipes();
        }

        function renderRecipes() {
                      const q = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('recipesGrid');
            const filtered = recipes.filter(r =>
                r.name.toLowerCase().includes(q) ||
                r.ingredients.toLowerCase().includes(q) ||
                r.category.toLowerCase().includes(q)
            );
            if (filtered.length === 0) {
                grid.innerHTML = '<p class="empty-state">No recipes found. Add your first recipe above!</p>';
                return;
            }
            grid.innerHTML = filtered.map(r => `
                              <div class="recipe-card">
                                  <h3>${escHtml(r.name)}</h3>
                                  ${r.category ? `<span class="category">${escHtml(r.category)}</span>` : ''}
                                  ${r.ingredients ? `<p><strong>Ingredients:</strong><br>${escHtml(r.ingredients).replace(/\n/g,'<br>')}</p>` : ''}
                                  ${r.instructions ? `<p style="margin-top:0.5rem"><strong>Method:</strong><br>${escHtml(r.instructions).replace(/\n/g,'<br>')}</p>` : ''}
                                  <div class="actions">
                                      <button class="btn btn-danger" onclick="deleteRecipe(${r.id})">Delete</button>
                                  </div>
                              </div>
                          `).join('');
        }

        function escHtml(s) {
                      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                        }

        renderRecipes();
    </script>
      </body>
      </html>
